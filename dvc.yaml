stages:
  clean_data:
    cmd: PYTHONPATH=. python src/data/clean_data.py
    deps:
      - data/raw/diabetic_data.csv
    outs:
      - data/processed/clean.csv

  build_features:
    cmd: PYTHONPATH=. python src/features/build_features.py
    deps:
      - data/processed/clean.csv
    outs:
      - data/features/features.parquet

  split_data:
    cmd: PYTHONPATH=. python src/data/split_data.py
    deps:
      - data/features/features.parquet
    outs:
      - data/features/train.parquet
      - data/features/test.parquet

  train_lr:
    cmd: PYTHONPATH=. python src/training/train_lr.py
    deps:
      - data/features/train.parquet
    outs:
      - models/artifacts/log_reg.pkl

  train_rf:
    cmd: PYTHONPATH=. python src/training/train_rf.py
    deps:
      - data/features/train.parquet
    outs:
      - models/artifacts/random_forest.pkl

  train_xgb:
    cmd: PYTHONPATH=. python src/training/train_xgb.py
    deps:
      - data/features/train.parquet
    outs:
      - models/artifacts/xgboost.pkl

  evaluate:
    cmd: PYTHONPATH=. python src/training/evaluate.py
    deps:
      - data/features/test.parquet
      - models/artifacts/
    outs:
      - reports/metrics.json

  select_best_model:
    cmd: PYTHONPATH=. python src/training/select_best_model.py
    deps:
      - reports/metrics.json
    outs:
      - reports/best_model.json

  register_model:
    cmd: PYTHONPATH=. python src/registry/register_model.py
    deps:
      - reports/best_model.json
      - models/artifacts/

