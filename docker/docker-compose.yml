version: "3.9"

services:
  mlflow:
    build:
      context: ..
      dockerfile: docker/mlflow.Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ../mlruns:/mlflow/artifacts

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - mlflow
