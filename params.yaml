split:
  test_size: 0.2
  random_state: 42

training:
  metric: auc
  min_auc_threshold: 0.75

log_reg:
  C: 1.0
  max_iter: 500

random_forest:
  n_estimators: 300
  max_depth: 15
  min_samples_split: 4
  min_samples_leaf: 2

xgboost:
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  reg_lambda: 1.0

